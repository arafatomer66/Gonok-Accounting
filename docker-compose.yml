services:
  postgres:
    image: postgres:16-alpine
    container_name: gonok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: gonok
      POSTGRES_USER: gonok
      POSTGRES_PASSWORD: gonok
    ports:
      - '5433:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  couchdb:
    image: couchdb:3
    container_name: gonok-couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    ports:
      - '5984:5984'
    volumes:
      - couchdata:/opt/couchdb/data

volumes:
  pgdata:
  couchdata:
