name: gonok

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:-13-234-68-147.sslip.io}
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - gonok-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    expose:
      - "80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gonok-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    expose:
      - "3333"
    env_file:
      - path: .env.prod
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      couchdb:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - gonok-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gonok}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gonok}
      POSTGRES_DB: ${POSTGRES_DB:-gonok}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gonok}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - gonok-net

  couchdb:
    image: couchdb:3
    environment:
      COUCHDB_USER: ${COUCHDB_USERNAME:-admin}
      COUCHDB_PASSWORD: ${COUCHDB_PASSWORD:-password}
    volumes:
      - couchdata:/opt/couchdb/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - gonok-net

volumes:
  pgdata:
  couchdata:
  caddy_data:
  caddy_config:

networks:
  gonok-net:
    driver: bridge
